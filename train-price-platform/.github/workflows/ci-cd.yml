name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/train-price-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/train-price-backend

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]
    defaults:
      run:
        working-directory: ./${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./${{ matrix.service }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

  docker-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-test-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: ./frontend
            image: ghcr.io/${{ github.repository_owner }}/train-price-frontend
          - context: ./backend
            image: ghcr.io/${{ github.repository_owner }}/train-price-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker-publish
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write app env
        run: |
          install -m 600 /dev/null infra/env/app.env
          cat > infra/env/app.env <<EOF
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }}
          JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }}
          PROVIDER_SNCF_API_KEY=${{ secrets.PROVIDER_SNCF_API_KEY }}
          PROVIDER_RAIL_EUROPE_API_KEY=${{ secrets.PROVIDER_RAIL_EUROPE_API_KEY }}
          EOF

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Pull latest images
        run: |
          docker pull ${{ env.FRONTEND_IMAGE }}:latest
          docker pull ${{ env.BACKEND_IMAGE }}:latest

      - name: Deploy
        run: |
          chmod +x infra/docker/scripts/deploy.sh
          ./infra/docker/scripts/deploy.sh

      - name: Cleanup dangling images
        run: docker image prune -f
