version: "3.9"

name: train-price-platform

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/docker/nginx/certs:/etc/nginx/certs:ro
    networks:
      - public
      - internal
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/your-org/train-price-frontend:latest
    container_name: frontend
    restart: unless-stopped
    env_file:
      - ./infra/env/app.env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: /api
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/your-org/train-price-backend:latest
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./infra/env/app.env
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://app:${POSTGRES_PASSWORD}@postgres:5432/train_prices?schema=public
      REDIS_URL: redis://redis:6379
      API_PREFIX: api
      CORS_ORIGIN: https://your-domain.example
      PROVIDER_TIMEOUT_MS: 2500
      CACHE_TTL_SECONDS: 300
      RATE_LIMIT_TTL_SECONDS: 60
      RATE_LIMIT_MAX: 120
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: train_prices
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d train_prices"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly no
      --save ""
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --protected-mode yes
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

networks:
  public:
  internal:
    internal: true

volumes:
  postgres_data:
